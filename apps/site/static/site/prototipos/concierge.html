<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protótipo — Converse com o Vô Testa | Pousada Vô Testa</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  noturno:'#051C2C', madeira:'#4F2C1D', lampiao:'#D7A048', pergaminho:'#EFDBB2', musgo:'#2E483E'
}, fontFamily:{ display:['Georgia','serif'], body:['system-ui','sans-serif'] } } } };
</script>
<style>
  body { background: linear-gradient(180deg,#FBF7EE 0%, #EFDBB2 100%); }
  .gear-spin { animation: spin 12s linear infinite; transform-origin:50% 50%; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg-in { animation: msgIn .35s ease-out; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .dot { animation: blink 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  #scroll::-webkit-scrollbar{width:6px}#scroll::-webkit-scrollbar-thumb{background:rgba(79,44,29,.2);border-radius:3px}
</style>
</head>
<body class="font-body text-madeira min-h-screen">

<header class="border-b border-madeira/10 bg-white/80 backdrop-blur">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <svg class="w-7 h-7 text-madeira gear-spin" viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="6"/><g fill="currentColor"><rect x="44" y="12" width="12" height="16" rx="3"/><rect x="44" y="72" width="12" height="16" rx="3"/><rect x="12" y="44" width="16" height="12" rx="3"/><rect x="72" y="44" width="16" height="12" rx="3"/></g></svg>
      <div><span class="font-display text-lg font-bold">Pousada Vô Testa</span>
      <span class="block text-madeira/40 text-[11px]">Protótipo — Converse com o Vô Testa (#1) · claro + musgo</span></div>
    </div>
    <span class="text-madeira/30 text-xs hidden sm:block">demonstração interativa</span>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 py-6">
  <div class="bg-white border border-madeira/5 rounded-3xl overflow-hidden shadow-xl">
    <!-- topo do chat -->
    <div class="bg-pergaminho/60 px-5 py-3 flex items-center gap-3 border-b border-madeira/10">
      <div class="w-10 h-10 rounded-full bg-musgo text-pergaminho font-bold flex items-center justify-center">VT</div>
      <div>
        <p class="font-display font-bold leading-tight text-madeira">Vô Testa</p>
        <p class="text-[11px] text-musgo flex items-center gap-1"><span class="w-2 h-2 bg-musgo rounded-full inline-block"></span> inventor de boas estadias · online</p>
      </div>
    </div>

    <!-- mensagens -->
    <div id="scroll" class="h-[440px] overflow-y-auto px-4 py-5 space-y-4 bg-white"></div>

    <!-- chips + input -->
    <div class="border-t border-madeira/10 p-3 bg-pergaminho/30">
      <div id="chips" class="flex flex-wrap gap-2 mb-3"></div>
      <form id="form" class="flex gap-2">
        <input id="inp" autocomplete="off" placeholder="Escreva pro Vô Testa..."
          class="flex-1 bg-white border border-madeira/15 rounded-full px-4 py-2.5 text-sm text-madeira placeholder:text-madeira/30 focus:border-musgo outline-none">
        <button class="bg-madeira text-pergaminho w-11 h-11 rounded-full flex items-center justify-center hover:bg-madeira/90 transition shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </form>
    </div>
  </div>
  <p class="text-center text-madeira/40 text-xs mt-4">Demo com respostas roteirizadas. No site real, a IA consulta a disponibilidade de verdade.</p>
</main>

<script>
const scroll = document.getElementById('scroll');
const chips = document.getElementById('chips');
const quartos = {
  romantico: { nome:'Cabine do Navegador', tag:'Suíte Premium · 2 hóspedes', preco:'624', desc:'Vista para o lago, banheira de cobre e um pôr do sol que parece pintado à mão.' },
  sossego:   { nome:'Oficina do Relojoeiro', tag:'Suíte Temática · 2 hóspedes', preco:'532', desc:'Relógios que sussurram, silêncio de verdade e vista para o jardim. O tempo desacelera aqui.' },
  familia:   { nome:'Torre do Astrônomo', tag:'Chalé Família · 4 hóspedes', preco:'910', desc:'Dois andares, claraboia para as estrelas e lareira para as histórias da noite.' },
  natureza:  { nome:'Ateliê do Ferreiro', tag:'Standard · 2 hóspedes', preco:'406', desc:'Pé na trilha, cheiro de mata e a forja antiga como companhia. Para quem quer aventura.' },
};
let estado = { intencao:null, datas:null, etapa:'intencao' };

function add(html, who) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-in flex ' + (who==='user' ? 'justify-end' : 'justify-start');
  wrap.innerHTML = who==='user'
    ? `<div class="bg-musgo text-pergaminho rounded-2xl rounded-br-sm px-4 py-2.5 text-sm max-w-[80%]">${html}</div>`
    : `<div class="flex gap-2 max-w-[88%]"><div class="w-8 h-8 rounded-full bg-musgo text-pergaminho text-xs font-bold flex items-center justify-center shrink-0 mt-0.5">VT</div><div class="bg-pergaminho/70 rounded-2xl rounded-bl-sm px-4 py-2.5 text-sm text-madeira">${html}</div></div>`;
  scroll.appendChild(wrap); scroll.scrollTop = scroll.scrollHeight;
}
function typing(cb, delay=900) {
  const t = document.createElement('div');
  t.className = 'flex justify-start msg-in';
  t.innerHTML = `<div class="flex gap-2"><div class="w-8 h-8 rounded-full bg-musgo text-pergaminho text-xs font-bold flex items-center justify-center mt-0.5">VT</div><div class="bg-pergaminho/70 rounded-2xl px-4 py-3"><span class="dot inline-block w-2 h-2 bg-madeira rounded-full mr-1"></span><span class="dot inline-block w-2 h-2 bg-madeira rounded-full mr-1"></span><span class="dot inline-block w-2 h-2 bg-madeira rounded-full"></span></div></div>`;
  scroll.appendChild(t); scroll.scrollTop = scroll.scrollHeight;
  setTimeout(()=>{ t.remove(); cb(); }, delay);
}
function setChips(arr) {
  chips.innerHTML = arr.map(c=>`<button onclick="responder('${c.replace(/'/g,"\\'")}')" class="text-xs border border-musgo/50 text-musgo rounded-full px-3 py-1.5 hover:bg-musgo hover:text-pergaminho transition">${c}</button>`).join('');
}
function cardQuarto(q) {
  return `<div class="mt-1 bg-white border border-madeira/15 rounded-xl overflow-hidden shadow-sm">
    <div class="h-24 bg-gradient-to-br from-pergaminho to-musgo/20 flex items-center justify-center text-madeira/30 text-xs">[ ${q.nome} ]</div>
    <div class="p-3">
      <p class="text-musgo text-[10px] uppercase tracking-wider font-semibold">${q.tag}</p>
      <p class="font-display font-bold text-madeira">${q.nome}</p>
      <p class="text-madeira/60 text-xs my-1">${q.desc}</p>
      <div class="flex items-center justify-between mt-2">
        <span class="text-madeira font-bold">R$ ${q.preco}<span class="text-madeira/40 text-xs font-normal">/noite</span></span>
        <a href="#" class="bg-madeira text-pergaminho text-xs font-bold px-4 py-2 rounded-lg hover:bg-madeira/90">Reservar →</a>
      </div>
    </div></div>`;
}

function detectarIntencao(txt) {
  txt = txt.toLowerCase();
  if (/(romant|lua de mel|casal|a dois|namorad|aniversári)/.test(txt)) return 'romantico';
  if (/(famíl|famil|filho|crian|grupo|amig)/.test(txt)) return 'familia';
  if (/(natur|trilha|aventura|mata|ar livre|caminh)/.test(txt)) return 'natureza';
  if (/(sosseg|paz|sumir|descans|desconect|trabalh|fugir|calma|silenc)/.test(txt)) return 'sossego';
  return null;
}

function responder(txt) {
  add(txt, 'user'); chips.innerHTML = '';
  if (estado.etapa === 'intencao') {
    estado.intencao = detectarIntencao(txt) || 'sossego';
    estado.etapa = 'datas';
    typing(()=>{
      const fala = {
        romantico:'Ah, o amor… as engrenagens batem mais forte. 💛 Para quando seria essa escapada a dois?',
        familia:'Casa cheia, coração cheio! Quando a família embarca nessa viagem no tempo?',
        natureza:'Um espírito explorador — disso eu gosto. Quando quer pisar na mata?',
        sossego:'Entendi… o mundo lá fora pode esperar. Quando você quer desacelerar?'
      }[estado.intencao];
      add(fala);
      setChips(['Em julho','Em agosto','Ainda não sei']);
    });
  } else if (estado.etapa === 'datas') {
    estado.datas = txt; estado.etapa = 'pessoas';
    typing(()=>{ add('Perfeito. E quantos viajantes nessa jornada?'); setChips(['Só eu','2','3','4 ou mais']); });
  } else if (estado.etapa === 'pessoas') {
    estado.etapa = 'fim';
    typing(()=>{
      add('Deixa eu consultar as engrenagens da disponibilidade…');
      typing(()=>{
        const q = quartos[estado.intencao];
        add('Encontrei a cabana que combina com o que você procura:' + cardQuarto(q));
        typing(()=>{ add('Quer que eu já segure as datas pra você? Posso te levar pro fim da reserva em poucos toques. ⚙'); setChips(['Reservar agora','Ver outra opção','Falar no WhatsApp']); }, 700);
      }, 1100);
    });
  } else {
    typing(()=>{ add('Estou aqui, viajante. Quer reservar ou prefere que eu mostre outra cabana?'); setChips(['Reservar agora','Ver outra opção']); });
  }
}

document.getElementById('form').addEventListener('submit', e=>{
  e.preventDefault();
  const v = document.getElementById('inp').value.trim();
  if (!v) return; document.getElementById('inp').value=''; responder(v);
});

typing(()=>{
  add('As engrenagens do tempo pararam só pra você. ⚙ Sou o Vô Testa — me conta: que tipo de fuga você procura?');
  setChips(['Quero sossego','Romântico a dois','Com a família','Curtir a natureza']);
}, 600);
</script>
</body>
</html>
