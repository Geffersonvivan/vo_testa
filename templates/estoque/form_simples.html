{% extends "base.html" %}

{% block titulo %}{{ titulo }} — Estoque{% endblock %}

{% block conteudo %}

<h1>{{ titulo }}</h1>
{% include "estoque/partials/nav.html" %}

<form method="post" class="form-cartao">
  {% csrf_token %}
  {% include "nucleo/partials/campos.html" %}

    <a href="{% url voltar %}" class="botao-neutro">Cancelar</a>
  </div>
</form>
{% endblock %}
