{# Ícone de porta por situação, no estilo Desbravador. #}
{% if situacao == 'livre' or situacao == 'chegada' %}
  {# Porta ABERTA (livre): batente ao fundo + folha aberta em perspectiva. #}
  <svg viewBox="0 0 32 32" class="porta-ico" fill="currentColor" aria-hidden="true">
    <path d="M12 27.2h8.2a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H12" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".5"/>
    <path d="M18.4 3.2 11 5.1A1.4 1.4 0 0 0 10 6.45v19.1a1.4 1.4 0 0 0 1 1.35l7.4 1.9A1 1 0 0 0 19.7 27.8V4.2A1 1 0 0 0 18.4 3.2Z"/>
    <circle cx="12.6" cy="16" r="1.15" fill="#fff"/>
    {% if situacao == 'chegada' %}<path d="M3 12.4v7.2l6-3.6z"/>{% endif %}
  </svg>
{% else %}
  {# Porta FECHADA (sólida) + símbolo branco. #}
  <svg viewBox="0 0 32 32" class="porta-ico" fill="currentColor" aria-hidden="true">
    <rect x="8.5" y="4" width="15" height="24" rx="1.8"/>
    {% if situacao == 'ocupada' %}
      <circle cx="16" cy="12.2" r="2.7" fill="#fff"/>
      <path d="M10.8 21.5a5.2 5.2 0 0 1 10.4 0z" fill="#fff"/>
    {% elif situacao == 'bloqueada' %}
      <path d="M21 10.2a3 3 0 0 1-3.95 2.85l-4.5 4.5 1.6 1.6 4.5-4.5A3 3 0 0 0 21.7 10.7l-1.85 1.85-1.5-1.5z" fill="#fff"/>
    {% elif situacao == 'a_limpar' %}
      <rect x="14.4" y="8.4" width="3.2" height="1.7" rx=".7" fill="#fff"/>
      <rect x="11.2" y="10" width="9.6" height="1.9" rx=".9" fill="#fff"/>
      <path d="M12.3 12.4h7.4l-.7 8.4a1 1 0 0 1-1 .9h-4a1 1 0 0 1-1-.9z" fill="#fff"/>
    {% elif situacao == 'em_limpeza' %}
      <path d="M20.3 8.4 13 15.7" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M9.6 16.6 15 22l2.6-2.6-5.4-5.4z" fill="#fff"/>
    {% else %}
      <circle cx="20" cy="16" r="1.2" fill="#fff"/>
    {% endif %}
  </svg>
{% endif %}
